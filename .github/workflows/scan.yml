name: Brainwallet Scanner
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: pip install bitcoin -q
      - name: Get wordlist
        run: |
          if [ ! -f rockyou.txt ] || [ $(wc -c < rockyou.txt) -lt 1000 ]; then
            echo "Downloading RockYou..."
            curl -sL -o rockyou.txt \
              "https://github.com/brannondorsey/naive-hashcat/releases/download/data/rockyou.txt"
            echo "Size: $(wc -c < rockyou.txt) bytes"
          fi
      - name: Scan
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        run: python3 scanner.py rockyou.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            FOUND_BTC.txt
            checkpoint.txt
      - name: Push checkpoint
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add checkpoint.txt
          git diff --cached --quiet || (git commit -m "chkpt" && git push)
