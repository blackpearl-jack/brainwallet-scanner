name: Brainwallet Scanner
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install bitcoin
      - name: Get wordlist
        run: |
          if [ ! -f rockyou.txt ]; then
            curl -L -o rockyou.txt "https://raw.githubusercontent.com/brannondorsey/naive-hashcat/master/rockyou.txt"
          fi
      - name: Scan
        run: python3 scanner.py rockyou.txt
      - name: Upload checkpoint (private)
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint
          path: checkpoint.txt
      - name: Upload hits (private)
        uses: actions/upload-artifact@v4
        with:
          name: found-btc
          path: FOUND_BTC.txt
          retention-days: 90
